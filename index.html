<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChemTracker Mobile | Kowir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        .bg-maroon { background-color: #800000; }
        .text-maroon { color: #800000; }
        
        /* Navigasi Aktif untuk Mobile */
        .mobile-nav-active { color: #800000 !important; transform: translateY(-5px); transition: all 0.3s; }
        .mobile-nav-active i { background: #fff1f1; padding: 10px; rounded-radius: 15px; }

        .tab-content { display: none; animation: slideIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Sembunyikan Scrollbar tapi tetap bisa scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <header class="p-6 bg-white border-b border-gray-100 sticky top-0 z-40 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold text-gray-900 tracking-tight" id="header-title">Home</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest" id="real-date"></p>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-2xl bg-maroon text-white flex items-center justify-center font-bold shadow-lg shadow-red-100">K</div>
        </div>
    </header>

    <main class="p-4 space-y-6">

        <section id="dashboard" class="tab-content active space-y-6">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-gray-50 flex items-center justify-between">
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Your Progress</p>
                    <h2 class="text-3xl font-black text-gray-800" id="task-ratio">0/0</h2>
                    <p class="text-[10px] font-bold text-green-500 uppercase italic">Great Work, Kowir!</p>
                </div>
                <div class="w-20 h-20"><canvas id="progressChart"></canvas></div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-50">
                <h3 class="font-black text-sm mb-4 flex items-center gap-2">
                    <span class="w-1 h-5 bg-maroon rounded-full"></span> Add New Activity
                </h3>
                <form id="activity-form" class="space-y-3">
                    <input type="text" id="title" required placeholder="Nama tugas kuliah..." class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-red-50 text-sm font-semibold transition">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="category" class="bg-gray-50 p-4 rounded-2xl outline-none text-xs font-bold text-gray-500">
                            <option value="Kuliah">📚 Kuliah</option>
                            <option value="Praktikum">🧪 Praktikum</option>
                            <option value="Organisasi">🤝 Organisasi</option>
                        </select>
                        <input type="datetime-local" id="deadline" required class="bg-gray-50 p-4 rounded-2xl outline-none text-[10px] font-bold text-gray-500">
                    </div>
                    <button type="submit" class="w-full bg-maroon text-white font-black py-4 rounded-2xl shadow-xl shadow-red-50 active:scale-95 transition">CREATE TASK</button>
                </form>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-sm px-2">Recent Tasks</h3>
                <div id="activity-list" class="space-y-3">
                    </div>
            </div>
        </section>

        <section id="courses" class="tab-content space-y-4">
            <h2 class="text-xl font-black px-2">My Courses</h2>
            <div class="space-y-3">
                <div class="bg-white p-5 rounded-3xl border border-gray-100 flex justify-between items-center">
                    <div><h4 class="font-bold text-sm">Kimia Organik</h4><p class="text-[10px] text-gray-400">4 SKS • Ruang 106</p></div>
                    <i class="fas fa-flask text-maroon opacity-20 text-2xl"></i>
                </div>
                <div class="bg-white p-5 rounded-3xl border border-gray-100 flex justify-between items-center">
                    <div><h4 class="font-bold text-sm">Praktikum Kimdas</h4><p class="text-[10px] text-gray-400">4 SKS • Lab. Lantai 8</p></div>
                    <i class="fas fa-vial text-maroon opacity-20 text-2xl"></i>
                </div>
            </div>
        </section>

        <section id="history" class="tab-content space-y-4">
            <h2 class="text-xl font-black px-2">History</h2>
            <div id="history-list" class="space-y-3">
                </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
        <button onclick="switchTab('dashboard', this)" class="nav-btn mobile-nav-active flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-th-large text-lg"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Home</span>
        </button>
        <button onclick="switchTab('courses', this)" class="nav-btn text-gray-300 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-graduation-cap text-lg"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Courses</span>
        </button>
        <button onclick="switchTab('history', this)" class="nav-btn text-gray-300 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-history text-lg"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">History</span>
        </button>
    </nav>

    <script>
        let activities = JSON.parse(localStorage.getItem('m_tasks')) || [];
        let historyData = JSON.parse(localStorage.getItem('m_history')) || [];

        // Tab Switcher
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('mobile-nav-active', 'text-maroon'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.add('text-gray-300'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('mobile-nav-active');
            btn.classList.remove('text-gray-300');
            
            document.getElementById('header-title').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1);
        }

        // Progress Chart
        const ctxP = document.getElementById('progressChart').getContext('2d');
        let progressChart = new Chart(ctxP, {
            type: 'doughnut',
            data: { datasets: [{ data: [0, 1], backgroundColor: ['#800000', '#f1f5f9'], borderWidth: 0, circumference: 180, rotation: 270 }] },
            options: { cutout: '80%', plugins: { tooltip: { enabled: false } } }
        });

        function render() {
            const list = document.getElementById('activity-list');
            const hList = document.getElementById('history-list');
            list.innerHTML = '';
            hList.innerHTML = '';

            activities.forEach((task, i) => {
                list.insertAdjacentHTML('beforeend', `
                    <div class="bg-white p-4 rounded-3xl flex items-center justify-between border border-gray-50 shadow-sm animate-fade-in">
                        <div class="flex items-center gap-4">
                            <button onclick="completeTask(${i})" class="w-10 h-10 rounded-2xl bg-red-50 text-maroon flex items-center justify-center shadow-inner"><i class="fas fa-check text-xs"></i></button>
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${task.title}</h4>
                                <p class="text-[9px] text-gray-400 font-black uppercase tracking-tighter">${task.category}</p>
                            </div>
                        </div>
                        <button onclick="deleteTask(${i})" class="text-gray-200 p-2"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                `);
            });

            historyData.forEach((task, i) => {
                hList.insertAdjacentHTML('beforeend', `
                    <div class="bg-gray-50 p-4 rounded-2xl flex items-center justify-between opacity-60">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-check-circle text-green-500"></i>
                            <h4 class="font-bold text-gray-500 line-through text-xs">${task.title}</h4>
                        </div>
                        <button onclick="undoTask(${i})" class="text-maroon p-2"><i class="fas fa-undo-alt text-xs"></i></button>
                    </div>
                `);
            });

            updateStats();
        }

        function updateStats() {
            const total = activities.length + historyData.length;
            document.getElementById('task-ratio').innerText = `${historyData.length}/${total}`;
            progressChart.data.datasets[0].data = [historyData.length, activities.length || 1];
            progressChart.update();
            localStorage.setItem('m_tasks', JSON.stringify(activities));
            localStorage.setItem('m_history', JSON.stringify(historyData));
        }

        window.completeTask = (i) => { historyData.unshift(activities.splice(i, 1)[0]); render(); }
        window.undoTask = (i) => { activities.push(historyData.splice(i, 1)[0]); render(); }
        window.deleteTask = (i) => { activities.splice(i, 1); render(); }

        document.getElementById('activity-form').addEventListener('submit', (e) => {
            e.preventDefault();
            activities.push({
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                deadline: document.getElementById('deadline').value
            });
            e.target.reset(); render();
        });

        document.getElementById('real-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' });
        render();
    </script>
</body>
</html>
